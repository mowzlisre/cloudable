name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact_glob: dist-electron/*.dmg
          - os: windows-latest
            platform: win
            artifact_glob: dist-electron/*.exe
          - os: ubuntu-latest
            platform: linux
            artifact_glob: dist-electron/*.AppImage

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install root dependencies (electron, electron-builder, AWS SDK, etc.)
      - name: Install root dependencies
        run: npm ci

      # Install and build the Vite frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # Package with electron-builder (platform-specific)
      - name: Package — macOS
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish never
        env:
          # Set to your Apple credentials in repo secrets to enable signing.
          # Leave unset for unsigned builds (CI/testing).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package — Windows
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never

      - name: Package — Linux
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never

      # Upload the packaged artifact
      - name: Upload artifact — macOS dmg
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: Cloudable-mac
          path: dist-electron/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact — Windows installer
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: Cloudable-win
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifact — Linux AppImage
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: Cloudable-linux
          path: dist-electron/*.AppImage
          if-no-files-found: error
          retention-days: 30

  # Collect all artifacts into a single summary when building from a tag
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
