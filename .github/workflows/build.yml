name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── macOS arm64 (Apple Silicon) ──────────────────────────────────────────────
  build-mac-arm64:
    name: Build (mac-arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - name: Make
        run: npx electron-forge make --platform darwin --arch arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: Cloudable-mac-arm64
          path: out/make/zip/darwin/**/*.zip
          if-no-files-found: error
          retention-days: 30

  # ── macOS x64 (Intel) ────────────────────────────────────────────────────────
  build-mac-x64:
    name: Build (mac-x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - name: Make
        run: npx electron-forge make --platform darwin --arch x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: Cloudable-mac-x64
          path: out/make/zip/darwin/**/*.zip
          if-no-files-found: error
          retention-days: 30

  # ── Windows x64 ──────────────────────────────────────────────────────────────
  build-win:
    name: Build (win-x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - name: Make
        run: npx electron-forge make --platform win32 --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: Cloudable-win
          path: out/make/squirrel.windows/**/*.exe
          if-no-files-found: error
          retention-days: 30

  # ── Linux deb ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: sudo apt-get install -y fakeroot dpkg
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - name: Make
        run: npx electron-forge make --platform linux --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: Cloudable-linux
          path: out/make/deb/**/*.deb
          if-no-files-found: error
          retention-days: 30

  # ── GitHub Release (tags only) ────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-mac-arm64, build-mac-x64, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
