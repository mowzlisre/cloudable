name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    name: Update homebrew-cloudable cask
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download release ZIPs
        run: |
          curl -sL "https://github.com/mowzlisre/cloudable/releases/download/${GITHUB_REF_NAME}/Cloudable-darwin-arm64.zip" -o arm64.zip
          curl -sL "https://github.com/mowzlisre/cloudable/releases/download/${GITHUB_REF_NAME}/Cloudable-darwin-x64.zip" -o x64.zip

      - name: Compute SHA256
        run: |
          echo "SHA256_ARM64=$(sha256sum arm64.zip | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA256_X64=$(sha256sum x64.zip | awk '{print $1}')" >> $GITHUB_ENV

      - name: Clone tap repo
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/mowzlisre/homebrew-cloudable.git tap

      - name: Update cask
        run: |
          cd tap
          sed -i "s/version \".*\"/version \"${VERSION}\"/g" Casks/cloudable.rb
          sed -i "/on_arm/,/on_intel/ s/sha256 \".*\"/sha256 \"${SHA256_ARM64}\"/" Casks/cloudable.rb
          sed -i "/on_intel/,/^\s*end/ s/sha256 \".*\"/sha256 \"${SHA256_X64}\"/" Casks/cloudable.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cloudable.rb
          git commit -m "Update Cloudable to v${VERSION}"
          git push
